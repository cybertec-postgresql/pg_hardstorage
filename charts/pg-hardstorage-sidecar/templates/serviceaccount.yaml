{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pg-hardstorage-sidecar.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pg-hardstorage-sidecar.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.rbac.create }}
{{- end }}
