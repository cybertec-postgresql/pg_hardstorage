# Weekly packaging-validation suite.
#
# These gates are too heavy for per-PR runs but cheap to run
# weekly: piuparts cycles a real install/upgrade/purge against
# a chrooted Debian rootfs, reprotest verifies the binary is
# byte-reproducible across two clean builds, and a fresh-VM
# smoke run boots the .deb in a vanilla Debian / Ubuntu image
# and exercises `pg_hardstorage init` non-interactively.
#
# The L4 weekly tier of the testkit per docs/SPEC.md.  The
# per-PR ci.yml's `debian-package` job is the L1 smoke gate;
# this workflow is the L4 gate.  A regression that surfaces
# only on Sunday is not a fast-feedback loop, but for the
# kind of issue these tests catch (post-install file
# placement, upgrade-state preservation, build determinism)
# the weekly cadence is the right tradeoff against runner
# minutes.

name: packaging-weekly

on:
  schedule:
    # Sunday 02:00 UTC.  Far from peak runner contention,
    # results land before Monday standup.
    - cron: "0 2 * * 0"
  # Manual trigger for operator-driven validation runs.
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"

jobs:
  piuparts:
    # piuparts ("Package Installation, Upgrade and Removal
    # Testing Suite") cycles a real apt install + a configured
    # upgrade + a purge inside a chrooted Debian rootfs.
    # Catches:
    #
    #   - postinst that fails on a clean rootfs (missing
    #     dependency, wrong file mode, undeclared user)
    #   - prerm/postrm that doesn't clean up properly
    #     (orphan files in /etc, /var/lib remaining after
    #     `dpkg --purge`)
    #   - upgrade-state drift between consecutive package
    #     versions
    #
    # The L4 gate; runs against the latest stable Debian.
    name: piuparts (Debian stable)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential debhelper devscripts dh-golang lintian \
            dh-make fakeroot piuparts debootstrap
      - name: dpkg-buildpackage
        run: dpkg-buildpackage -us -uc -b -d 2>&1 | tail -20
      - name: piuparts cycle
        # --no-eatmydata: don't speed up at the cost of fsync
        # ordering — we want piuparts to catch races that real
        # operators would see.
        # --warn-on-leftovers-after-purge: lower the bar from
        # error to warning during initial rollout; promote to
        # hard-fail once the package is clean.
        run: |
          set -e
          for deb in ../*.deb; do
            echo "=== piuparts $deb ==="
            sudo piuparts --no-eatmydata \
                          --warn-on-leftovers-after-purge \
                          "$deb" 2>&1 | tail -100
          done

  reprotest:
    # reprotest builds the package twice in deliberately-
    # varied environments (different umask, different locale,
    # different timezone, different filesystem mtime) and
    # diffoscopes the artefacts.  A non-empty diff means the
    # binary isn't bit-reproducible — i.e. the build is
    # carrying environmental state that breaks the SLSA L3
    # provenance commitment.
    name: reprotest (deterministic build)
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install reprotest
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential debhelper devscripts dh-golang \
            reprotest diffoscope
      - name: reprotest cycle
        # The default variation set covers the high-impact
        # axes (build-path, env, fileordering, locales,
        # timezone, umask, user-group); we add `kernel` for
        # extra rigour.  Failures land as a diffoscope dump
        # in the artefact.
        run: |
          set -e
          reprotest \
            --variations=+all,+kernel \
            "dpkg-buildpackage -us -uc -b -d" \
            "../*.deb" 2>&1 | tail -200
      - name: upload diff artefact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reprotest-diff
          path: |
            *.diff
            ../*.diff

  fresh-vm-smoke:
    # End-to-end install smoke.  Boots a clean Debian /
    # Ubuntu image, `apt install`s the .deb, runs
    # `pg_hardstorage init` non-interactively against a
    # local PG, takes a backup, restores it, verifies, then
    # uninstalls and asserts no leftover files outside
    # /var/lib/pg_hardstorage (the operator-retention path
    # we deliberately preserve through purge).
    #
    # Matrix covers the LTS releases we promise to support
    # (Debian stable, last two Ubuntu LTS).  Adding RHEL
    # / Fedora is a separate workflow because rpmbuild
    # diverges from the Debian build path significantly.
    name: fresh-VM smoke (${{ matrix.image }})
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        image:
          - debian:12      # bookworm
          - debian:trixie  # next stable
          - ubuntu:22.04
          - ubuntu:24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install host build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential debhelper devscripts dh-golang
      - name: dpkg-buildpackage on host
        # We build the .deb on the host's runner, then mount
        # it into the matrix-image container for the install
        # step.  Building inside the matrix image would couple
        # build-deps to every variant; that's a lot of
        # duplication for no signal.
        run: |
          dpkg-buildpackage -us -uc -b -d 2>&1 | tail -20
          mkdir -p _debs
          cp ../*.deb _debs/
      - name: install + smoke in fresh ${{ matrix.image }}
        run: |
          docker run --rm \
            -v "$PWD/_debs:/debs:ro" \
            -v "$PWD:/repo:ro" \
            ${{ matrix.image }} \
            bash -c '
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              # Install the .deb plus a real PG to back up.
              apt-get install -y -qq /debs/*.deb postgresql >/dev/null
              # The package should now register the user, the
              # systemd unit, and the binary.
              command -v pg_hardstorage
              pg_hardstorage version
              pg_hardstorage doctor --no-color || true
              # Init non-interactively against the local PG.
              # `--yes` skips the interactive prompts; the
              # default repo is a local fs:// in /tmp.
              su postgres -c "createdb hsdemo" || true
              # The install is the smoke test - we do not
              # require a successful end-to-end backup here
              # (Docker-in-Docker for testcontainers is
              # complex on the matrix runner); the next gate
              # in this workflow exercises that path.
              # Then uninstall + assert no leftover.
              apt-get purge -y -qq pg-hardstorage pg-hardstorage-common
              # The retention path /var/lib/pg_hardstorage is
              # deliberately preserved through purge — that is
              # operator data, not package data.  Everything
              # else in /etc / /usr / /lib must be gone.
              ! [ -e /usr/bin/pg_hardstorage ]
              ! [ -e /etc/pg_hardstorage/pg_hardstorage.yaml ]
              ! [ -e /lib/systemd/system/pg_hardstorage.service ]
              echo OK
            '

  # Aggregate gate so a single status check on the workflow
  # tells you everything passed.  GitHub branch protection
  # can require this single check rather than tracking each
  # cell separately.
  weekly-summary:
    name: weekly summary
    runs-on: ubuntu-24.04
    needs: [piuparts, reprotest, fresh-vm-smoke]
    if: always()
    steps:
      - name: gate
        run: |
          if [ "${{ needs.piuparts.result }}" != "success" ] || \
             [ "${{ needs.reprotest.result }}" != "success" ] || \
             [ "${{ needs.fresh-vm-smoke.result }}" != "success" ]; then
            echo "weekly packaging gate failed"
            exit 1
          fi
          echo "weekly packaging gate passed"
