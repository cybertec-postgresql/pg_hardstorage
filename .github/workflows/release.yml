# Release — fires on tag push (v*).
#
# Builds reproducible binaries via goreleaser, generates SBOMs via syft,
# signs everything via cosign keyless (Sigstore OIDC against the GitHub
# Actions OIDC issuer), publishes a GitHub Release with attached
# checksums + .deb + .rpm, and pushes container images to GHCR.
#
# We don't publish to package registries (distro repos,
# Helm chart repo) from this workflow — that's a manual step gated on
# manual review of the release notes. goreleaser's GitHub Release is
# the authoritative artefact source.

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # create the GitHub Release
  packages: write       # push images to GHCR
  id-token: write       # cosign keyless via OIDC

env:
  GO_VERSION: "1.26.4"

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0       # goreleaser needs full history for changelog
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: install cosign
        uses: sigstore/cosign-installer@v3
      - name: install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: set up QEMU (multi-arch image builds)
        if: vars.PUBLISH_CONTAINERS == 'true'
        uses: docker/setup-qemu-action@v3
      - name: set up Docker Buildx
        if: vars.PUBLISH_CONTAINERS == 'true'
        uses: docker/setup-buildx-action@v3
      - name: docker login (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: goreleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          # Container images publish to GHCR only when the repo/org
          # variable PUBLISH_CONTAINERS == 'true'. Until the org enables
          # Actions package-write on ghcr.io (otherwise the push fails
          # `denied: permission_denied: write_package` and aborts the
          # whole release), --skip=docker is passed so the binaries /
          # .deb / .rpm / Homebrew / GitHub Release still ship. Flip the
          # variable to 'true' once GHCR is enabled, then re-tag to
          # publish images. (--skip=docker covers docker_manifests too.)
          args: release --clean ${{ vars.PUBLISH_CONTAINERS == 'true' && '' || '--skip=docker' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Separate fine-grained PAT (contents:write on the homebrew-tap
          # repo) so goreleaser can push the updated formula there; the
          # default GITHUB_TOKEN can't write a second repo.  Consumed by
          # the brews: stanza in .goreleaser.yaml.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # Capture the goreleaser-emitted artifact list as JSON so the
      # SLSA generator can compute checksums for the binaries +
      # archives + .deb + .rpm.  goreleaser writes this to
      # dist/artifacts.json by default.
      - name: collect artifact metadata
        id: collect-artifacts
        run: |
          # subject-checksums maps to the SLSA generator's expected
          # input shape: a base64-encoded text blob, one
          # "<sha256>  <filename>" line per artifact.
          checksums=$(cd dist && sha256sum *.tar.gz *.zip *.deb *.rpm 2>/dev/null | base64 -w0 || true)
          if [ -z "$checksums" ]; then
            echo "no artifacts to attest"
            exit 0
          fi
          echo "subject-checksums=$checksums" >> "$GITHUB_OUTPUT"
    outputs:
      subject-checksums: ${{ steps.collect-artifacts.outputs.subject-checksums }}

  # SLSA Level 3 build provenance.  The reusable generator is
  # documented at https://github.com/slsa-framework/slsa-github-generator.
  # It runs on a separate, locked-down GitHub-hosted runner that has
  # access to OIDC but NOT the goreleaser-built artifacts directly —
  # that's the SLSA L3 isolation invariant.  The generator signs
  # the provenance keylessly via Sigstore + uploads the
  # ".intoto.jsonl" attestation to the same GitHub Release.
  #
  # Verifying a release post-hoc:
  #   slsa-verifier verify-artifact \
  #       --provenance-path pg_hardstorage_<ver>_linux_amd64.intoto.jsonl \
  #       --source-uri github.com/cybertec-postgresql/pg_hardstorage \
  #       --source-tag v0.7.0 \
  #       pg_hardstorage_<ver>_linux_amd64.tar.gz
  slsa-provenance:
    name: SLSA L3 provenance
    needs: [goreleaser]
    if: needs.goreleaser.outputs.subject-checksums != ''
    permissions:
      actions: read       # required for SLSA L3 isolation
      id-token: write     # OIDC token for keyless signing
      contents: write     # upload the .intoto.jsonl to the Release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.subject-checksums }}"
      upload-assets: true
      provenance-name: pg_hardstorage.intoto.jsonl

  # End-to-end verification of the real user path: `brew install --cask`
  # from the public tap on a macOS runner, then run the installed binary.
  # This is the one thing the local (Linux) release checks can't cover —
  # Homebrew evaluates the cask's Ruby DSL and symlinks the binary into
  # $PATH, which only happens on macOS/brew.
  #
  # The tap cask is updated either by goreleaser (when HOMEBREW_TAP_TOKEN
  # is valid) or manually shortly after the release, so this job POLLS
  # the tap until it serves this release's version before installing. If
  # the cask hasn't been pushed yet it fails cleanly — re-run just this
  # job (Actions → this run → "Re-run failed jobs") after the cask lands.
  homebrew-smoke:
    name: Homebrew cask install (macOS)
    needs: [goreleaser]
    # Run even when goreleaser reports failure: the release artifacts are
    # published before goreleaser's cask-push step (which fails today on the
    # tap token, HOMEBREW_TAP_TOKEN), so the tarballs the cask points at DO
    # exist. Without this the job is always skipped. `!cancelled()` still
    # skips on a manual workflow cancel.
    if: ${{ !cancelled() }}
    runs-on: macos-latest
    steps:
      - name: Derive release version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Wait for the tap cask to reflect this release
        env:
          WANT: ${{ steps.v.outputs.version }}
        run: |
          url="https://raw.githubusercontent.com/cybertec-postgresql/homebrew-tap/main/Casks/pg_hardstorage.rb"
          for i in $(seq 1 20); do
            got=$(curl -fsSL "$url" | sed -n 's/^[[:space:]]*version "\(.*\)"/\1/p' | head -1 || true)
            echo "attempt $i/20: tap cask version=${got:-<none>} want=$WANT"
            if [ "$got" = "$WANT" ]; then exit 0; fi
            sleep 30
          done
          echo "::error::tap cask did not reach $WANT within ~10 min — push the cask, then re-run this job"
          exit 1
      - name: brew install --cask from the tap
        run: |
          brew update --quiet || true
          brew install --cask cybertec-postgresql/tap/pg_hardstorage
      - name: Smoke-test the installed binary
        env:
          WANT: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          out=$(pg_hardstorage --version)
          echo "$out"
          echo "$out" | grep -q "$WANT" || { echo "::error::--version ($out) does not report $WANT"; exit 1; }
          pg_hardstorage --help >/dev/null
          repo="file://$(mktemp -d)/repo"
          pg_hardstorage repo init "$repo" >/dev/null
          pg_hardstorage glossary RPO >/dev/null
          echo "✓ brew-installed pg_hardstorage $WANT runs (version, help, repo init, glossary)"
