# pg_hardstorage documentation site config.
#
# Build:    make docs-build      → site/
# Serve:    make docs-serve      → http://localhost:8000
# Regen:    make docs-regen      → rebuild every auto-generated page
#
# Hosting: this site builds as a portable static directory.
# When we switch on a public domain, set `site_url` below to
# the canonical URL (e.g. "https://docs.pghardstorage.org")
# — that's the *only* required content change.  All internal
# links are relative; all assets are repo-local.

site_name: pg_hardstorage
site_description: PostgreSQL backup, done right — agent + CLI documentation
site_author: CYBERTEC PostgreSQL International GmbH
# Canonical domain.  docs/CNAME carries the same hostname so
# GitHub Pages serves the site at this address.  See issue #83
# for the cutover details.
site_url: "https://docs.pghardstorage.org"

repo_name: cybertec-postgresql/pg_hardstorage
repo_url: https://github.com/cybertec-postgresql/pg_hardstorage
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# Material is the chosen theme.  Search-first, dark-mode
# aware, native admonitions + tabs + code-copy buttons.
theme:
  name: material
  features:
    # Single-page-app navigation: pre-fetches linked pages,
    # cuts perceived latency.
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    # Tabs at the top reflect the Diátaxis split.
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    # Per-page TOC pinned right; "back to top" button.
    - toc.follow
    - navigation.top
    # Search: live, suggestion, share-link.
    - search.suggest
    - search.share
    # Code blocks: copy button + line-link anchors.
    - content.code.copy
    - content.code.annotate
    - content.code.select
    # Tab groups inside content (e.g. for one tutorial that
    # shows the same flow in CLI vs REST vs gRPC).
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    # Self-host the fonts so the site works air-gapped /
    # behind locked-down corporate proxies — doc readers
    # are likely on networks where Google CDN is blocked.
    text: false
    code: false
  icon:
    repo: fontawesome/brands/github

# Markdown extensions: pick the rich set Material supports.
markdown_extensions:
  # Admonitions: !!! note / !!! warning / !!! danger.
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Tabbed content blocks.
  - pymdownx.tabbed:
      alternate_style: true
  # Inline code highlighting + line numbers + copy.
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  # Footnotes for citation-style references.
  - footnotes
  # Definition lists for glossary-style content.
  - def_list
  # Task lists, smart symbols, smarty quotes.
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  # Inline mark / strikethrough / etc.
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  # Auto-link bare URLs.
  - pymdownx.magiclink:
      repo_url_shortener: true
      user: cybertec-postgresql
      repo: pg_hardstorage
  # Better tables.
  - tables
  # Cross-page anchor injection.
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      permalink_title: "Permalink to this section"

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # Tags surface across the site (e.g. "patroni", "kms",
  # "k8s").  Plugin fails silently if no front-matter tags
  # are set, so it's safe to enable from day 1.
  - tags
  # Versioning is provided by `mike` post-v1.0; for now we
  # ship "latest" only.  Plugin not yet active — see
  # DOC_PLAN.md "Open decisions".

