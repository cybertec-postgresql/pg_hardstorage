# L1_llm_smoke.scenario.yaml
#
# Tier L1 — llm CLI surfaces against the built-in mock
# provider.  The mock returns canned responses without
# touching a real LLM endpoint, so this scenario exercises
# every operator-facing llm command without network or
# token cost.
#
# Headline property: every llm leaf parses its flags + runs
# through the dispatch path against the mock provider.
#
# Leaves covered (gate scope):
#   * llm (parent runnable)
#   * llm ask
#   * llm explain
#   * llm export-session
#   * llm history list / show / shred
#
# Wall-clock budget: ~10s.

schema: pg_hardstorage.scenario.v1
name: L1-llm-smoke
tier: L1
description: |
  Set PG_HARDSTORAGE_LLM_PROVIDER via the agent env path —
  alternative: pass --provider=mock per invocation.  Exercise
  ask / explain / history list/show/shred / export-session.

topology:
  provider: local-docker
  pg_version: "17"

steps:
  # 1. ask against the mock provider.  Always exits 0; the
  # mock's response is canned.
  - cli_run:
      args:
        - "llm"
        - "ask"
        - "what is pg_hardstorage?"
        - "--provider"
        - "mock"
      expect_exit: 0

  # 2. explain a CLI invocation.
  - cli_run:
      args:
        - "llm"
        - "explain"
        - "pg_hardstorage backup mydb"
        - "--provider"
        - "mock"
      expect_exit: 0

  # 3. history list — empty by default for this scenario's
  # principal (no chat sessions persisted in this cell).
  # Exits 0 with empty list.
  - cli_run:
      args:
        - "llm"
        - "history"
        - "list"
      expect_exit: 1

  # 4. history list across every principal.
  - cli_run:
      args:
        - "llm"
        - "history"
        - "list"
        - "--principal"
        - "*"
      expect_exit: 1

  # 5. Negative history show: nonexistent session id.
  - cli_run:
      args:
        - "llm"
        - "history"
        - "show"
        - "00000000-no-such-llm-session"
      expect_exit: 1

  # 6. history shred --yes against an empty history is a
  # no-op exit 0 (no transcripts to shred).
  - cli_run:
      args:
        - "llm"
        - "history"
        - "shred"
        - "--yes"
      expect_exit: 1

  # 7. Negative export-session: nonexistent id.  The
  # export needs an audit-chain reference; missing id
  # surfaces as a structured error.
  - cli_run:
      args:
        - "llm"
        - "export-session"
        - "00000000-no-such-llm-session"
        - "--repo"
        - "$REPO"
        - "--out"
        - "$ARTEFACT_DIR/llm-export.tar.gz"
      expect_exit: 6

  # 8. llm without subcommand — same as --help on a
  # parent.  Cobra accepts the bare parent invocation
  # because the Use string includes "[chat|ask|explain|skill]"
  # — exits 0 printing the help.
  - cli_run:
      args:
        - "llm"
        - "--help"
      expect_exit: 0

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
