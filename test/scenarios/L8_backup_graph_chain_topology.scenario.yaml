# L8_backup_graph_chain_topology.scenario.yaml
#
# Tier L8 — `backup graph <deployment>` walks every
# visible manifest for the deployment, links by
# parent_backup_id, and reports per-node chunk-overlap
# (dedup analysis).  It's the operator's primary tool
# for understanding "where did my repo's bytes go" and
# for spotting weird backup chains (e.g. a full when
# they expected an incremental).
#
# What this catches:
#   * Graph-walk completeness: every backup landed in
#     the chain must appear in the graph.  A buggy
#     walker that hit an early termination would miss
#     some nodes and surface here as a graph with
#     fewer-than-expected entries (we don't structurally
#     assert the count; the gate is "exits 0 with
#     non-empty output" plus the chain-mention via
#     stdout substring).
#   * Per-node overlap correctness: a chain of full
#     backups against the same database should report
#     high inter-backup chunk overlap (dedup is the
#     point).  Hard to assert structurally without
#     parsing the output; the gate stays loose here.
#
# Wall-clock budget: ~3 minutes (1 GB seed + 3 backups +
# graph probe).
schema: pg_hardstorage.scenario.v1
name: L8-backup-graph-chain-topology
tier: L8
description: |
  3 backups → `backup graph` reports the chain topology
  + per-node dedup metrics.

topology:
  provider: local-docker
  pg_version: "17"

steps:
  - seed:
      target_gb: 1

  - take_backup:
      deployment: l8-backup-graph
      name: backup_1

  - take_backup:
      deployment: l8-backup-graph
      name: backup_2

  - take_backup:
      deployment: l8-backup-graph
      name: backup_3

  - cli_run:
      args:
        - "backup"
        - "graph"
        - "$DEPLOYMENT"
        - "--repo"
        - "$REPO"
      timeout: 30s

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
