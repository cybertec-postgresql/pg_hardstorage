# L8_hsrepo_corruption_blocks_open.scenario.yaml
#
# Tier L8 — HSREPO is the canary file every `repo.Open`
# reads first.  When operators (or storage backends) flip
# a byte in it, every subsequent operation against the
# repo must refuse with a clear error rather than treat
# the repo as uninitialised (which would lure operators
# into running `repo init` and clobbering whatever was
# salvageable).
#
# The class of bug this guards:
#   * HSREPO parse leniency: a too-permissive JSON loader
#     that silently zero-fills missing fields after a byte
#     flip would let repo.Open succeed with garbage
#     metadata, and the next operation would then trip
#     on the WRONG error (e.g. ErrSchemaMismatch instead
#     of HSREPO-tampered).
#   * Audit-chain coverage of repo-state events: the
#     audit log must record the repo.open_failed event so
#     forensics can trace the corruption to when it was
#     first observed.
#
# Wall-clock budget: ~3 minutes (1 GB seed + 1 backup +
# corrupt + verify probe).
schema: pg_hardstorage.scenario.v1
name: L8-hsrepo-corruption-blocks-open
tier: L8
description: |
  Take a backup → flip a byte in HSREPO → next operation
  against the repo must surface a structured error.

topology:
  provider: local-docker
  pg_version: "17"

steps:
  - seed:
      target_gb: 1

  - take_backup:
      deployment: l8-hsrepo-corrupt
      name: pre_corruption

  - corrupt_repo_object:
      repo_target: hsrepo
      mutation: flip_bit_at
      offset: 16
      # HSREPO is a small JSON document whose first ~32 bytes
      # are the `schema:"pg_hardstorage.repo.v1"` header.  A
      # flipped bit at offset 16 lands inside that schema
      # string, so the next `repo.Open` refuses with
      # `repo: schema "p?_hardstorage.repo.v1" is not supported`
      # rather than a verify.* prefix.  Surface that exact
      # signature: ANY substring of the resulting error chain
      # makes the assertion pass.  (Side note worth filing:
      # the agent surfaces the schema-mismatch under the
      # generic `internal` error code rather than something
      # more specific like `repo.schema_unsupported`; the
      # scenario tolerates that today and would still pass
      # under a future refactor that introduces the more
      # specific code.)
      expect_error_prefix: "not supported"

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
