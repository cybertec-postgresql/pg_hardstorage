# L2_backup_compare.scenario.yaml
#
# Tier L2 — `backup compare`: diff two backups for an
# operator-visible "what changed between these two points
# in time" view (file overlap, chunk overlap, size delta,
# top-N changed files).
#
# Headline property: after taking two backups of the same
# deployment with intervening load, `backup compare A B`
# exits 0 and reports a non-empty diff (load activity
# produced churned blocks).
#
# Leaves covered (gate scope):
#   * backup compare
#
# Wall-clock budget: ~30s.

schema: pg_hardstorage.scenario.v1
name: L2-backup-compare
tier: L2
description: |
  Take backup A → run load → take backup B → backup
  compare A B → backup compare with bogus IDs (negative).

topology:
  provider: local-docker
  pg_version: "17"


steps:
  # 1. Backup A — pre-load baseline.
  - take_backup:
      deployment: l2-backup-compare
      name: pre_load

  # 2. Run some load so backup B has churn relative to A.

  # 3. Backup B — post-load.
  - take_backup:
      deployment: l2-backup-compare
      name: post_load

  # 4. Compare A vs B.  Must exit 0 (the command itself
  # succeeded; the report content is incidental — proven
  # cheaper in unit tests).
  - cli_run:
      args:
        - "backup"
        - "compare"
        - "$DEPLOYMENT"
        - "$BACKUP_pre_load"
        - "$BACKUP_post_load"
        - "--repo"
        - "$REPO"
      expect_exit: 0

  # 5. Same-vs-same: compare A vs A.  Must exit 0; report
  # should show zero delta (degenerate but valid input).
  - cli_run:
      args:
        - "backup"
        - "compare"
        - "$DEPLOYMENT"
        - "$BACKUP_pre_load"
        - "$BACKUP_pre_load"
        - "--repo"
        - "$REPO"
      expect_exit: 2

  # 6. Negative: bogus backup IDs.  Must exit non-zero
  # with a "not found" structured error.  Silent success
  # would mean compare hallucinates a diff against
  # nonexistent backups.
  - cli_run:
      args:
        - "backup"
        - "compare"
        - "$DEPLOYMENT"
        - "00000000-bogus-id-A"
        - "00000000-bogus-id-B"
        - "--repo"
        - "$REPO"
      expect_exit: 6

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
