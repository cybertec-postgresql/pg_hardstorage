# L2_jit_revoke.scenario.yaml
#
# Tier L2 — JIT credential cross-cover scenario: 2nd touch
# for issue / list / show / verify / revoke.  Focuses on
# the multi-principal + filter case to complement
# L2_jit_lifecycle's single-principal flow.
#
# Leaves covered (gate scope — 2nd touch):
#   * jit issue (2nd)
#   * jit list (2nd, with multiple filters)
#   * jit show (2nd, negative)
#   * jit verify (2nd, negative)
#   * jit revoke (2nd, negative)
#
# Wall-clock budget: ~10s.

schema: pg_hardstorage.scenario.v1
name: L2-jit-revoke
tier: L2
description: |
  Issue tokens for two principals → list with various
  filters → exercise show/verify/revoke negatives.

topology:
  provider: local-docker
  pg_version: "17"

steps:
  # 1. Issue token for bob, scoped to backup.delete only.
  - cli_run:
      args:
        - "jit"
        - "issue"
        - "bob"
        - "--repo"
        - "$REPO"
        - "--scope"
        - "backup.delete"
        - "--duration"
        - "30m"
        - "--reason"
        - "scenario probe: 2nd-touch bob"
        - "--issued-by"
        - "scenario-probe"
      expect_exit: 0

  # 2. Issue another for carol, tenant-scoped.
  - cli_run:
      args:
        - "jit"
        - "issue"
        - "carol"
        - "--repo"
        - "$REPO"
        - "--scope"
        - "kms.rotate"
        - "--duration"
        - "2h"
        - "--reason"
        - "scenario probe: 2nd-touch carol"
        - "--issued-by"
        - "scenario-probe"
        - "--tenant"
        - "tenant-a"
      expect_exit: 0

  # 3. list filter by tenant.
  - cli_run:
      args:
        - "jit"
        - "list"
        - "--repo"
        - "$REPO"
        - "--tenant"
        - "tenant-a"
      expect_exit: 0
      expect_stdout_contains: "carol"

  # 4. list filter by status=active.
  - cli_run:
      args:
        - "jit"
        - "list"
        - "--repo"
        - "$REPO"
        - "--status"
        - "active"
      expect_exit: 0

  # 5. Negative show.
  - cli_run:
      args:
        - "jit"
        - "show"
        - "00000000-still-no-such-token-00000000"
        - "--repo"
        - "$REPO"
      expect_exit: 6

  # 6. Negative verify: tenant-scoped check.
  - cli_run:
      args:
        - "jit"
        - "verify"
        - "--repo"
        - "$REPO"
        - "--token"
        - "AAAAAAAAAAAAAAAAAAAAAAAA"
        - "--operation"
        - "kms.rotate"
        - "--tenant"
        - "tenant-a"
      expect_exit: 2

  # 7. Negative revoke.
  - cli_run:
      args:
        - "jit"
        - "revoke"
        - "00000000-still-no-such-token-00000000"
        - "--repo"
        - "$REPO"
        - "--by"
        - "scenario-probe"
        - "--reason"
        - "scenario probe: 2nd-touch negative revoke"
      expect_exit: 6

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
