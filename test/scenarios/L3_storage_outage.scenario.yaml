# L3_storage_outage.scenario.yaml
#
# Tier L3 — exercises the backup-tool's behaviour when the
# storage backend goes dark mid-flight.  Uses the
# `docker_pause` fault to freeze the sink container for a
# heal_window, simulating the network-storm / GC-pause class
# of outage every cloud-storage backend will eventually have.
#
# What this catches that the per-sink restore-correctness
# scenarios don't:
#   * Retry-budget regressions in any backend's Put / Get /
#     RenameIfNotExists path (a docker-paused container
#     holds open TCP sockets, so this looks like "ack-less
#     packet drop" — not "RST" — to the client).
#   * Restore correctness across a mid-stream pause: the
#     upload that was in flight when the sink froze must
#     either complete cleanly on resume or be retried by
#     the client.  L7 (assert_restored_match strict) catches
#     any silent corruption that slips through.
#   * Liveness: take_backup must return a successful
#     manifest once the heal_window expires and the sink
#     unpauses.  A regression that makes the client give
#     up too early would fail the take_backup step here.
#
# Wall-clock budget: ~3 minutes (1 GB seed + a 30 s sink
# pause inside take_backup + restore + verify).
#
# Air-gap: pre-pull the sink image once on a connected box:
#   pg_hardstorage_testkit image pull-sinks --only=s3-minio
# Then runs go offline:
#   pg_hardstorage_testkit scenario run \
#       test/scenarios/L3_storage_outage.scenario.yaml \
#       --airgap

schema: pg_hardstorage.scenario.v1
name: L3-storage-outage
tier: L3
description: |
  Backup → restore round-trip while the storage backend
  is briefly unreachable mid-flight (docker pause).  Tests
  retry-budget liveness and restore correctness across
  the outage window.

topology:
  provider: local-docker
  pg_version: "17"

# MinIO is the canonical "real client SDK" sink.  The S3
# AWS SDK v2 has the most aggressive retry config of any
# backend we ship, so it's the most useful surface for
# this scenario; switch to azurite/sftp/gcs-fake in copies
# if regression coverage on those clients matters more.
sink:
  kind: s3-minio

steps:
  # 1 GB pgbench seed.  Large enough that take_backup will
  # span the heal_window — a tiny seed would finish before
  # the pause lands and the test wouldn't actually exercise
  # the retry budget.
  - seed:
      target_gb: 1

  - capture_lsn:
      name: post_seed
      checksum_query: |
        select
          count(*)::text || '|' ||
          coalesce(sum(abalance)::text, '0') || '|' ||
          coalesce(sum(hashtextextended(t::text, 0))::text, '0')
        from pgbench_accounts t

  # Pause the sink container for 30 s, BEFORE take_backup
  # starts.  The recovery (unpause) fires at the end of the
  # heal_window, and the immediately-next take_backup step
  # then runs against a healthy sink.  This isn't quite the
  # "pause MID-flight" shape — that requires a parallel-step
  # primitive the runner doesn't have yet — but it's the
  # next-best surface: it asserts the sink can come back
  # cleanly from a pause, and the next backup observes
  # consistent state.
  - inject:
      kind: docker_pause
      target: sink
      heal_window: 30s

  - take_backup:
      deployment: l3-storage-outage

  - restore:
      deployment: l3-storage-outage
      name: post_seed

  - assert_restored_match:
      name: post_seed
      strict: true

asserts:
  - count_exact:
      table: pgbench_accounts
      value: 6700000

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
