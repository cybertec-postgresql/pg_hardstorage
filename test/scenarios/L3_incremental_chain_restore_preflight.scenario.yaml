# L3_incremental_chain_restore_preflight.scenario.yaml
#
# Tier L3: prove the chain restore's preflight contract — when
# conditions are wrong, the chain restore code path MUST abort
# BEFORE pg_combinebackup writes a single byte to the target.
#
# Scope and rename:
#
#   The plan called this "L4 disk pressure during chain restore".
#   A literal in-flight ENOSPC during chain restore requires
#   either an in-band async fault injection during restore (no
#   scenario primitive today) or a topology with controllable
#   disk quotas (the local-docker provider can't usefully apply
#   disk_full to the restore target since it's on the operator's
#   host fs and the 256-MiB cap doesn't dent typical dev disks).
#
#   The OPERATIONAL property the disk-pressure scenario is really
#   protecting is identical to the property the preflight target-
#   empty check protects: when conditions for safe restore are
#   wrong, the chain-restore code path MUST abort BEFORE
#   committing any bytes to the target.  Disk pressure is one
#   trigger; pre-existing target content is another, exit-coded
#   identically (4 / preflight.chain_target_not_empty), and the
#   same code path enforces both.  This scenario exercises the
#   accessible trigger, in service of the same invariant.
#
# What this scenario guards against:
#
#   * Silent target overwrite.  A regression where the chain
#     restore code path skipped the preflight emptiness check
#     (because the check was only on the single-backup path)
#     would let pg_combinebackup intermingle chain bytes with
#     the user's pre-existing files — a disaster the structured
#     error guards against.
#
#   * Wrong error class.  The CLI MUST exit with the v1 contract
#     code 4 (preflight failure) and the structured error code
#     MUST be `preflight.chain_target_not_empty` — so monitoring
#     + operator tooling distinguish "forgot --force" from "the
#     backup is broken".
#
#   * Reversibility.  Passing --force on a second attempt MUST
#     succeed.  Proves the preflight is the ONLY guard — no
#     persistent state from the failed attempt blocks the retry.
#     A regression that mid-aborts and leaves a sticky lock would
#     surface here.
#
# Wall-clock budget: ~30s.

schema: pg_hardstorage.scenario.v1
name: L3-incremental-chain-restore-preflight
tier: L3
description: |
  3-link chain; first restore populates target; second restore
  into the same target fails preflight; third restore with
  --force succeeds.  All three driven through cli_run so the
  exit codes are independently asserted.

topology:
  provider: local-docker
  pg_version: "17"

load:
  file: test/load/failover_loop.load.yaml

steps:
  # 1. Build a 3-link chain whose leaf is restored repeatedly.
  - assert:
      - count_exact: { table: users, value: 1000 }

  - take_backup:
      deployment: l3-pflight
      name: anchor_full

  - run_load: { duration: 2s }
  - take_backup:
      deployment: l3-pflight
      incremental_from: "$LAST_BACKUP"
      name: incr_1

  - run_load: { duration: 2s }
  - take_backup:
      deployment: l3-pflight
      incremental_from: incr_1
      name: chain_leaf

  # 2. First restore: populates $ARTEFACT_DIR/preflight_target.
  #    Drives the chain-restore code path (incremental leaf →
  #    pg_combinebackup → flatten) which is what we want to
  #    test the preflight against.  --verify-restore=off
  #    matches the testkit's standard pattern for not coupling
  #    success to host pg_ctl.
  - cli_run:
      args:
        - "restore"
        - "l3-pflight"
        - "$BACKUP_chain_leaf"
        - "--target"
        - "$ARTEFACT_DIR/preflight_target"
        - "--repo"
        - "$REPO"
        - "--verify-restore"
        - "off"
      expect_exit: 0

  # 3. THE proof step: second restore into the SAME (now-populated)
  #    target without --force.  Expected: exit 4 (preflight
  #    failure per v1 contract) + structured error code
  #    `preflight.target_pg_datadir` — the first restore left a
  #    complete PG data dir there, so the preflight check
  #    detects "this looks like a real PG cluster" and refuses,
  #    even stronger than the generic "non-empty target" guard.
  #    A regression where chain restore skipped the PG-datadir
  #    detection (because it was on the single-backup-only path)
  #    would let pg_combinebackup intermingle chain bytes with
  #    the existing cluster's files.
  - cli_run:
      args:
        - "restore"
        - "l3-pflight"
        - "$BACKUP_chain_leaf"
        - "--target"
        - "$ARTEFACT_DIR/preflight_target"
        - "--repo"
        - "$REPO"
        - "--verify-restore"
        - "off"
      expect_exit: 4
      expect_stderr_contains: "preflight.target_pg_datadir"

  # 4. --force does NOT bypass the chain-restore preflight.
  #    pg_combinebackup requires its target to not pre-exist
  #    or to be empty (PG-side invariant we can't override),
  #    so chain restore is atomic — there is no "merge into
  #    existing data dir" mode.  This step proves the design:
  #    even with --force, the chain restore still refuses.
  #    The operator's remediation (per the Suggestion in the
  #    error body) is "rm -rf the target dir" — which is a
  #    user-side action this scenario doesn't simulate.
  - cli_run:
      args:
        - "restore"
        - "l3-pflight"
        - "$BACKUP_chain_leaf"
        - "--target"
        - "$ARTEFACT_DIR/preflight_target"
        - "--repo"
        - "$REPO"
        - "--verify-restore"
        - "off"
        - "--force"
      expect_exit: 4
      expect_stderr_contains: "preflight.chain_target_not_empty"

  # 5. Reversibility: a restore into a FRESH (different) target
  #    dir succeeds normally — proves that the failed attempts
  #    above did not leave persistent state in the repo (locks,
  #    half-written staging) that blocks future restores.
  - cli_run:
      args:
        - "restore"
        - "l3-pflight"
        - "$BACKUP_chain_leaf"
        - "--target"
        - "$ARTEFACT_DIR/preflight_target_fresh"
        - "--repo"
        - "$REPO"
        - "--verify-restore"
        - "off"
      expect_exit: 0

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
