# L3_restore_correctness.scenario.yaml
#
# Tier L3: per-PR fast gate that exercises the full
# restore-correctness defence stack on a real (small) backup.
#
#   * L1 — Manifest.Validate runs at restore start
#   * L2 — in-process pg_verifybackup runs after files materialise
#   * L3 — postverify cluster-start smoke test runs after recovery
#   * L4 — pg_dumpall round-trip when --verify-restore=dump
#   * L7 — assert_restored_match (strict) byte-equal against live
#
# A regression in any of L1-L7 fails this scenario in <2 minutes.
# Designed to run on every PR; the L4 patroni scenario remains
# the heavier soak.
#
# Why a small dataset (1 GB pgbench): the fast PR signal matters
# more than coverage breadth at this tier.  The L4 scenario
# exercises 5 GB + multi-node failover for the heavier pre-merge
# check.

schema: pg_hardstorage.scenario.v1
name: L3-restore-correctness
tier: L3
description: |
  Backup → restore round-trip with the full L1-L4+L7 defence
  stack engaged (strict mode).  Catches issue-#7-class
  regressions on every PR in ~1-2 minutes.

topology:
  provider: local-docker
  pg_version: "17"

# No `load:` block — the seed step below populates pgbench_*
# tables which are richer correctness-test fodder than the
# load engine's deterministic faker (whose emails collide on
# re-application against a unique index, see runner/ops.go's
# faker_users generator; tracked separately).

steps:
  # Bulk seed — small (1 GB) for fast PR turnaround.  Enough to
  # get a realistic basebackup tar with files, dirs, indexes,
  # but not so big the per-PR run blocks the merge queue.
  # pgbench scale=67 produces ~6.7 M rows in pgbench_accounts.
  - seed:
      target_gb: 1

  # Capture LSN + checksum BEFORE take_backup.  The implied
  # invariant: no DML happens between capture_lsn and
  # take_backup, so the cluster's logical state at capture-LSN
  # is identical to its state at backup-end-LSN.  After restore
  # the basebackup brings the cluster up to backup-end-LSN
  # naturally; the restored checksum must match the captured
  # live checksum.
  - capture_lsn:
      name: post_seed
      checksum_query: |
        select
          count(*)::text || '|' ||
          coalesce(sum(abalance)::text, '0') || '|' ||
          coalesce(sum(hashtextextended(t::text, 0))::text, '0')
        from pgbench_accounts t

  # Take the basebackup.  testkit-driven scenarios pass
  # --include-wal=true to the agent so the basebackup carries
  # every WAL segment needed for recovery up to backup-end-LSN.
  # No wal_stream sidecar required to make the
  # assert_restored_match sandbox cluster reach a consistent
  # state.
  - take_backup:
      deployment: l3-restore-correctness

  # Restore the basebackup with no PITR target.  PG runs
  # recovery to end-of-WAL-in-basebackup (backup-end-LSN)
  # and starts cleanly.  `name: post_seed` establishes the
  # linkage to the captured state without forcing a PITR
  # replay past what the basebackup contains.
  #
  # Manifest.Validate (L1) + in-process pg_verifybackup (L2)
  # run inside the agent's restore; postverify (L3 cluster-
  # start smoke) is disabled because the testkit runs the
  # equivalent gate via assert_restored_match in a sandboxed
  # postgres:<version> container — see startRestoredSandbox
  # in runner/steps.go.
  - restore:
      deployment: l3-restore-correctness
      name: post_seed

  # Strict byte-equal correctness check: start the restored
  # datadir as a sandbox container running postgres:<version>,
  # re-run the captured query inside that container, diff.
  # strict=true means the step HARD-FAILS if the sandbox
  # can't be brought up — guarantees CI never silently skips
  # the gate that would have caught issue #7.
  - assert_restored_match:
      name: post_seed
      strict: true

asserts:
  # pgbench scale=67 → 6.7 M rows in pgbench_accounts.  The
  # seed step is deterministic; this catches a regression in
  # the seed path itself.
  - count_exact:
      table: pgbench_accounts
      value: 6700000

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
