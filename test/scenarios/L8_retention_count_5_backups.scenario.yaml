# L8_retention_count_5_backups.scenario.yaml
#
# Tier L8 — count-based retention applied to a 5-backup chain.
# The headline property: after taking 5 backups and running
# `rotate --policy count --keep-fulls 3 --apply`, exactly 2 of
# the older backups are tombstoned and the 3 newest survive.
# A regression in the count-policy's selection (or in
# ms.SoftDelete's tombstone write) would surface as either
# the wrong backups being marked or wrong counts in the
# rendered decision.
#
# Why this scenario exists: the unit tests cover
# CountPolicy.Apply against synthesised manifest lists; this
# scenario exercises the same logic against the REAL agent +
# REAL manifest store + REAL chunk-bearing backups, plus the
# downstream `repo gc --dry-run` that an operator would run
# to see how many chunks would be reclaimed.
#
# Leaves covered (gate scope, 2nd touch on rotate / undelete):
#   * rotate (with --policy count, dry-run + apply forms)
#   * backup undelete (resurrect one tombstoned backup)
#   * repo gc --dry-run (forecast reclaimable bytes)
#
# Wall-clock budget: ~3 minutes.

schema: pg_hardstorage.scenario.v1
name: L8-retention-count-5-backups
tier: L8
description: |
  5 backups → rotate --policy count --keep-fulls 3 --dry-run
  → rotate --apply → backup list shows 2 tombstoned → repo gc
  --dry-run forecasts orphan reclaim → backup undelete one →
  rotate again (idempotent — same 2 tombstoned).

topology:
  provider: local-docker
  pg_version: "17"

steps:
  # 5 backups with light load between each so chunk sets
  # differ.  Names let later steps inspect specific entries.
  - take_backup: { deployment: l8-retention-count, name: bk1 }
  - take_backup: { deployment: l8-retention-count, name: bk2 }
  - take_backup: { deployment: l8-retention-count, name: bk3 }
  - take_backup: { deployment: l8-retention-count, name: bk4 }
  - take_backup: { deployment: l8-retention-count, name: bk5 }

  # 1. rotate dry-run — must report 5 backups, 2 marked for
  # delete, 3 kept.  Exit 0 (dry-run never mutates so never
  # exits non-zero on a "successful" decision).
  - cli_run:
      args:
        - "rotate"
        - "$DEPLOYMENT"
        - "--repo"
        - "$REPO"
        - "--policy"
        - "count"
        - "--keep-fulls"
        - "3"
      expect_exit: 0
      expect_stdout_contains: "count"

  # 2. rotate --apply — actually tombstones the 2 oldest.
  - cli_run:
      args:
        - "rotate"
        - "$DEPLOYMENT"
        - "--repo"
        - "$REPO"
        - "--policy"
        - "count"
        - "--keep-fulls"
        - "3"
        - "--apply"
      expect_exit: 0

  # 3. backup list — confirms the tombstones landed.  Operators
  # don't see tombstoned backups in default list output, so we
  # use --include-deleted (if accepted; otherwise just smoke).
  - cli_run:
      args:
        - "list"
        - "$DEPLOYMENT"
        - "--repo"
        - "$REPO"
      expect_exit: 0

  # 4. repo gc --dry-run — preview chunk reclaim.  The 2
  # tombstoned backups' uniquely-referenced chunks become
  # candidates.  Output should report a non-zero
  # "candidate_count" (exact value depends on the load
  # between backups, so we don't assert the number).
  - cli_run:
      args:
        - "repo"
        - "gc"
        - "--repo"
        - "$REPO"
      expect_exit: 0

  # 5. backup undelete bk1 — resurrect the oldest.  This is the
  # safety net for "retention misconfigured, restore an old
  # backup before repo gc reaps it".
  - cli_run:
      args:
        - "backup"
        - "undelete"
        - "$DEPLOYMENT"
        - "$BACKUP_bk1"
        - "--repo"
        - "$REPO"
      expect_exit: 0

  # 6. rotate --apply again — idempotent.  bk1 is now live
  # again, so the count policy will re-target it (and bk2)
  # for tombstoning.  Exit 0; no error.
  - cli_run:
      args:
        - "rotate"
        - "$DEPLOYMENT"
        - "--repo"
        - "$REPO"
        - "--policy"
        - "count"
        - "--keep-fulls"
        - "3"
        - "--apply"
      expect_exit: 0

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
