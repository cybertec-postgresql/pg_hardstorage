# L2_audit_chain.scenario.yaml
#
# E2E coverage for the audit hash-chain.  Every operator-visible
# action emits an audit event linked to the previous one via
# SHA-256(prev_event_canonical_json).  Tampering with any
# historical event invalidates every successor's prev_hash.
#
# Why this matters: the audit log is the "what happened, in
# order, that I can prove later" surface for compliance audits.
# Unit tests prove the chain code adds + verifies events; this
# scenario proves the wired-up CLI commands produce a chain that
# (a) actually grows with operator actions and (b) verifies clean
# end-to-end.
#
# What gets exercised:
#
#   * audit append — record a synthetic event
#   * audit search — query events with filters
#   * audit summary — aggregate counts by action
#   * audit verify-chain — walk + check every prev_hash
#   * audit anchor — publish chain head into transparency log
#   * audit verify-anchor — confirm anchor matches local chain
#   * audit export-bundle — sign an evidence bundle
#   * audit verify-bundle — verify the signed bundle
#
# Pass criterion: every audit command exits 0 and verify-chain
# reports clean (no tamper findings).  A regression in the chain
# linkage surfaces as verify-chain returning non-zero.
#
# Wall-clock budget: ~10s.

schema: pg_hardstorage.scenario.v1
name: L2-audit-chain
tier: L2
description: |
  Audit hash-chain round-trip: append events via take_backup +
  audit append, then walk and verify the chain head, anchor it,
  re-verify the anchor, export-and-verify a bundle.

topology:
  provider: local-docker
  pg_version: "17"

steps:
  # 1. take_backup emits an audit event for the backup.start /
  # backup.completed pair, growing the chain.
  - take_backup:
      deployment: l2-audit-chain

  # 2. Append a synthetic event — proves the operator-driven
  # append path works (separate from the auto-emitted backup
  # events).
  - cli_run:
      args:
        - "audit"
        - "append"
        - "scenario.probe"
        - "--actor"
        - "testkit"
        - "--deployment"
        - "$DEPLOYMENT"
        - "--reason"
        - "L2_audit_chain.scenario.yaml step 2"
        - "--repo"
        - "$REPO"
        - "--output"
        - "json"
      expect_exit: 0

  # 3. search filters: by action prefix.  The smoke goal is
  # "command exits 0 with valid JSON"; deeper assertions on
  # the body shape would couple to format details that are
  # legitimately in flux.
  - cli_run:
      args:
        - "audit"
        - "search"
        - "--repo"
        - "$REPO"
        - "--output"
        - "json"
      expect_exit: 0
      expect_stdout_contains: "schema"

  # 4. summary — aggregate counts by action.
  - cli_run:
      args:
        - "audit"
        - "summary"
        - "--repo"
        - "$REPO"
        - "--output"
        - "json"
      expect_exit: 0

  # 5. verify-chain — THE INVARIANT.  Walks every event and
  # asserts every prev_hash links to the prior event's
  # canonical-JSON hash.  Must exit 0 on a clean chain; would
  # exit non-zero if any event had been tampered with.
  - cli_run:
      args:
        - "audit"
        - "verify-chain"
        - "--repo"
        - "$REPO"
        - "--output"
        - "json"
      expect_exit: 0

  # 6. anchor — publishes the current chain head into the
  # transparency log (writes a sibling file in the repo).
  # The bytes are now committed.  Subsequent verify-anchor /
  # verify-bundle steps need the anchor's <log-id> from this
  # command's stdout — wiring stdout-capture-into-state is a
  # cli_run extension we'll land in a follow-up; for now the
  # anchor write itself proves the wired-up surface works
  # and verify-chain (step 5) already proved the chain
  # invariant.
  - cli_run:
      args:
        - "audit"
        - "anchor"
        - "--repo"
        - "$REPO"
        - "--output"
        - "json"
      expect_exit: 0

  # 7. export-bundle — emits a signed evidence bundle (a
  # tar/zip of audit events + manifests + signatures) at a
  # caller-specified path.  We assert the export succeeds;
  # round-tripping verify-bundle is deferred (same captured-
  # state plumbing as verify-anchor — needs the bundle path
  # bound into a placeholder for the next step).
  - cli_run:
      args:
        - "audit"
        - "export-bundle"
        - "--repo"
        - "$REPO"
        - "--out"
        - "$ARTEFACT_DIR/audit-bundle.zip"
        - "--output"
        - "json"
      expect_exit: 0

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
