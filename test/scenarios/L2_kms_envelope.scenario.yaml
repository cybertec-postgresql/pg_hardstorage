# L2_kms_envelope.scenario.yaml
#
# E2E coverage for the at-rest encryption envelope surfaces.
# Without an explicit KEK in the keyring, backups land
# unencrypted; `kms inspect` reports keyring state and
# `kms verify` walks every manifest's encryption block.
#
# Why this matters: the encryption envelope is what protects
# backups at rest.  An operator who flips on encryption later
# needs `kms verify` to tell them "every backup in this repo
# decrypts cleanly under the current keyring" — silent failure
# mode is "kms verify says ok even when a backup's wrapped DEK
# is corrupt".  Unit tests prove the envelope code paths; this
# scenario proves the wired-up commands work against a real
# repo with real manifests.
#
# What gets exercised:
#
#   * kms inspect — keyring state (no KEK == unencrypted posture)
#   * kms verify — fleet-wide envelope check
#   * kms verify against an empty repo — must still exit 0
#     (zero manifests is not a failure)
#
# Encrypted-backup + KMS rotate coverage lives in a separate
# L3 scenario (needs a KEK fixture set up in the keyring dir
# before the topology comes up).
#
# Pass criterion: kms inspect + verify exit 0 with structured
# output.  Wall-clock budget: ~8s.

schema: pg_hardstorage.scenario.v1
name: L2-kms-envelope
tier: L2
description: |
  Read-only KMS surfaces: inspect keyring, verify envelope on
  every manifest in a populated repo.

topology:
  provider: local-docker
  pg_version: "17"

steps:
  # Take a backup so kms verify has a manifest to walk.
  - take_backup:
      deployment: l2-kms-envelope

  # 1. inspect — keyring summary (signing keypair fingerprint,
  # KEK presence).  Read-only and safe at any cadence.
  - cli_run:
      args: ["kms", "inspect", "--output", "json"]
      expect_exit: 0
      expect_stdout_contains: "schema"

  # 2. verify — walks every manifest's encryption block.  In
  # the no-KEK posture, every manifest is classified
  # 'unencrypted' (NOT a failure — that's the operator's
  # policy call per the kms verify docstring).
  - cli_run:
      args:
        - "kms"
        - "verify"
        - "--repo"
        - "$REPO"
        - "--output"
        - "json"
      expect_exit: 0

  # 3. inspect text-format — exercises the non-JSON renderer
  # which has its own code path (text.TextWriter contract).
  # Failure mode: a regression in the renderer that crashes
  # on a particular field would surface here as exit 1 even
  # though JSON output works.
  - cli_run:
      args: ["kms", "inspect"]
      expect_exit: 0

cleanup:
  on_success: tear_down
  on_failure: "keep_for:1h"
