# L2-s3-credentials-question.llm-test.yaml
#
# Operator can't get S3 backups to work — auth errors.

schema: pg_hardstorage.llm-test.v1
name: L2-s3-credentials-question
tier: L2
description: |
  Operator can't get S3 backups to work — auth errors.

seed_context:
  trigger:
    code: |
      storage.unreachable
    message: |
      open backend: s3: SignatureDoesNotMatch

mode: ask
turns:
  - 'my S3 backups are failing with SignatureDoesNotMatch.  what do I check?'

rubric:
  hard:
    must_contain_any:
      - 'AWS'
      - 'credentials'
      - 'key'
      - 'region'
    must_not_contain:
      - 'rm -rf'
  soft:
      - 'Does the response point at AWS credentials (env vars or IAM role)?'
      - 'Does the response mention region match or clock skew as common causes?'

temperature: 0.2
