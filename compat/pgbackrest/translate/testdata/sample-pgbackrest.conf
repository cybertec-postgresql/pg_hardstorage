# Sample pgbackrest.conf used by translator tests.
# Mixed posix + s3, with cipher + retention + ignored knobs.

[global]
repo1-type=posix
repo1-path=/var/lib/pgbackrest
repo1-cipher-type=aes-256-cbc
repo1-cipher-pass=hunter2
compress-type=lz4
log-level-console=info
process-max=4

[db1]
pg1-host=db1.example.com
pg1-port=5432
pg1-database=postgres
pg1-user=pgbackup
retention-full=4

[db2]
pg1-host=db2.example.com
pg1-database=warehouse
pg1-user=pgbackup
repo1-type=s3
repo1-s3-bucket=acme-pg-backups
repo1-s3-region=us-east-1
repo1-path=db2-prefix
retention-full=2
backup-standby=y
