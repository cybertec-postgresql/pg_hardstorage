; Sample Barman configuration used by translator round-trip tests.
; Modelled on the typical /etc/barman.d/db1.conf an operator would
; ship in production; not a copy of any specific upstream document.

[barman]
barman_user = barman
configuration_files_directory = /etc/barman.d
log_file = /var/log/barman/barman.log
log_level = INFO

[db1]
description = "Primary cluster — orders db"
conninfo = host=db1.example.com user=barman dbname=postgres
streaming_conninfo = host=db1.example.com user=streaming_barman dbname=postgres
backup_method = postgres
slot_name = barman_db1
create_slot = auto
streaming_archiver = on
parallel_jobs = 4
compression = zstd
retention_policy = RECOVERY WINDOW OF 7 DAYS
minimum_redundancy = 2
backup_directory = /var/lib/barman/db1
immediate_checkpoint = false
retry_times = 3
retry_sleep = 30
pre_backup_script = /usr/local/sbin/snapshot-warn.sh
post_backup_script = /usr/local/sbin/page-on-failure.sh
archive_command = barman-wal-archive db1 %p
archive_mode = on
custom_unmapped_setting = something_local

[db2-reporting]
description = Reporting replica
conninfo = host=db2.example.com user=barman dbname=postgres
backup_method = rsync
retention_policy = REDUNDANCY 4
backup_directory = /mnt/nfs/barman/db2-reporting
